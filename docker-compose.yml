version: "3.9"

services:
  cropguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: cropguard-ai:latest
    container_name: cropguard_app
    ports:
      - "8501:8501"
    volumes:
      # Persist checkpoints, scans DB, and logs between container restarts
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
      - ./logs:/app/logs
      - ./eval_results:/app/eval_results
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
